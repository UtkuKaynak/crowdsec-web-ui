# mail-flow.yaml — EXPERIMENTAL mail-flow classifier for the Web UI "Mail" page.
#
# MESSAGE ACCOUNTING (mailgraph-style) — counts MAILS, not connections.
# Connection/attack behaviour (SASL bursts, spam bots, dictionary attacks) is
# NOT here — that is the "Mail attacks by scenario" panel + your scenarios.
#
# Classifies Postfix events into named nodes `mail/<category>`. CrowdSec exposes
# a per-node counter `cs_node_hits_ok_total{name="mail/..."}` for each, which the
# Web UI scrapes into the mail-flow volume chart.
#
# NODE-NAME CONTRACT (the Web UI keys off these exact names) — same source lines
# mailgraph uses:
#   mail/received   <- postfix/qmgr  "<qid>: from=<...>, size=..., nrcpt=..."  (queued message)
#   mail/sent       <- delivery agent "status=sent"      (delivered, per recipient)
#   mail/bounced    <- delivery agent "status=bounced"
#   mail/deferred   <- delivery agent "status=deferred"
#   mail/rejected   <- postfix/smtpd|cleanup "reject: "  (refused message)
#
# Each node sets evt.Meta.mail_category via `statics` — a filter-only node is
# "empty" and CrowdSec rejects it.
#
# ⚠️  EXPERIMENTAL — validate before relying on it:
#   sudo cp -r recipes/mail/parsers/* /etc/crowdsec/parsers/
#   sudo crowdsec -t && sudo systemctl reload crowdsec
#   curl -s localhost:6060/metrics | grep 'name="mail/'
# Field assumptions: the syslog parser sets evt.Parsed.program / evt.Parsed.message.
#
name: custom/mail-flow
description: "Classify Postfix mail events into mail/<category> message-accounting nodes"
filter: "evt.Parsed.program != '' && evt.Parsed.program startsWith 'postfix/'"
nodes:
  # mailgraph "received" = a message was queued (one qmgr from= line per message).
  - name: mail/received
    filter: "evt.Parsed.program endsWith '/qmgr' && evt.Parsed.message contains 'from=<' && evt.Parsed.message contains 'nrcpt='"
    statics:
      - meta: mail_category
        value: received
  # mailgraph "sent" = a message was delivered (local mailbox or remote MX), per recipient.
  - name: mail/sent
    filter: "evt.Parsed.message contains 'status=sent'"
    statics:
      - meta: mail_category
        value: sent
  - name: mail/bounced
    filter: "evt.Parsed.message contains 'status=bounced'"
    statics:
      - meta: mail_category
        value: bounced
  - name: mail/deferred
    filter: "evt.Parsed.message contains 'status=deferred'"
    statics:
      - meta: mail_category
        value: deferred
  # Refused messages (NOQUEUE/cleanup reject). Excludes 'reject_warning:'.
  - name: mail/rejected
    filter: "(evt.Parsed.program endsWith '/smtpd' || evt.Parsed.program endsWith '/cleanup') && evt.Parsed.message contains 'reject: '"
    statics:
      - meta: mail_category
        value: rejected

  # --- OPTIONAL: content spam/virus (only if you run amavis/SpamAssassin) -----
  # Uncomment to add mailgraph-style content categories. Harmless if you have no
  # amavis lines (the nodes just never fire). Add 'spam'/'virus' to taste.
  # - name: mail/spam
  #   filter: "evt.Parsed.program contains 'amavis' && (evt.Parsed.message contains 'Blocked SPAM' || evt.Parsed.message contains 'Passed SPAM')"
  #   statics:
  #     - meta: mail_category
  #       value: spam
  # - name: mail/virus
  #   filter: "evt.Parsed.program contains 'amavis' && evt.Parsed.message contains 'INFECTED'"
  #   statics:
  #     - meta: mail_category
  #       value: virus

  # --- recipient capture (for the dictionary-attack scenario) ----------------
  # Not a mail/* node, so it is NOT ingested as volume — it only enriches meta.
  - grok:
      pattern: 'to=<%{DATA:mail_rcpt}>'
      apply_on: message
    statics:
      - meta: mail_rcpt
        expression: evt.Parsed.mail_rcpt
